<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- TOP BAR -->
<div class="bg-dark text-white d-flex justify-content-between align-items-center px-3 py-2">
    <div id="currentUser"></div>

    <form action="/logout" method="post">
        <button class="btn btn-outline-light btn-sm">Logout</button>
    </form>
</div>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-2 bg-white min-vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item bg-primary text-white">
                    <a class="btn text-white" href="/user">User</a>
                </li>
            </ul>
        </div>

        <!-- CONTENT -->
        <div class="col-10 p-4">
            <h2>User information-page</h2>

            <div class="card">
                <div class="card-header">
                    About user
                </div>

                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                        </tr>
                        </thead>

                        <tbody id="userTable"></tbody>

                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function loadCurrentUser() {
        fetch('/users/current')
            .then(res => res.json())
            .then(user => {

                // верхняя панель
                document.getElementById("currentUser").innerHTML =
                    `<strong>${user.email}</strong> with roles: ${
                        user.roles.map(r => r.name.replace("ROLE_", "")).join(" ")
                    }`;

                // таблица
                document.getElementById("userTable").innerHTML = `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.name}</td>
                        <td>${user.lastName}</td>
                        <td>${user.age}</td>
                        <td>${user.email}</td>
                        <td>${user.roles.map(r => r.name.replace("ROLE_", "")).join(" ")}</td>
                    </tr>
                `;
            });
    }

    document.addEventListener("DOMContentLoaded", loadCurrentUser);
</script>

</body>
</html>
