<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="bg-dark text-white d-flex justify-content-between align-items-center px-3 py-2">
    <div>
        <strong th:text="${currentUser.username}"></strong>
        with roles:
        <span th:each="role : ${currentUser.roles}"
              th:text="${role.name + ' '}"></span>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">
            Logout
        </button>
    </form>
</div>
<div class="container-fluid">
    <div class="row">
        <!-- Создаём вертикальное меню -->
        <div class="col-2 bg-white min-vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="/admin">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user">User</a>
                </li>
            </ul>
        </div>
        <!-- Создаём основную оюласть -->
        <div class="col-10 p-4 mb-0">
            <h2>Admin panel</h2>
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#users">
                        Users table
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#newUser">
                        New User
                    </button>
                </li>
            </ul>
            <div class="tab-content mt-3">

                <!-- Форма добавления нового пользователя -->
                <div class="bg-white border tab-pane fade" id="newUser">
                    <form id="addUserForm">
                        <div class="bg-light text-black-50">
                            <h5 class="mb-0 border p-3 bg-light text-dark">Add new user</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputFirstName">First Name</label>
                                </h6>
                                <input type="text" class="form-control" id="inputFirstName">
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputLastName">Last Name</label>
                                </h6>
                                <input type="text" class="form-control" id="inputLastName">
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputAge">Age</label>
                                </h6>
                                <input type="number" class="form-control" id="inputAge">
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputEmail4">Email</label>
                                </h6>
                                <input type="text" class="form-control" id="inputEmail4">
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputPass">Password</label>
                                </h6>
                                <input type="password" class="form-control" id="inputPass">
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputRole">Role</label></h6>
                                <select multiple class="form-select" name="roleIds" id="inputRole" size="2"></select>
                            </div>
                            <div class="mb-2 mt-2 text-center">
                                <button type="submit" class="btn btn-success col-2">Add new user</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>

            <!-- Таблица пользователей -->
            <div class="bg-white border tab-pane fade show active" id="users">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">All users</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-striped mb-0">
                            <thead class="table-white">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody id="usersTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="id" id="editId">

                    <div class="mb-3 text-center">
                        <label>ID</label>
                        <input type="text" class="form-control" id="editIdDisplay" disabled>
                    </div>

                    <div class="mb-3 text-center">
                        <label>First name</label>
                        <input type="text" class="form-control" name="username" id="editName">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Last name</label>
                        <input type="text" class="form-control" name="lastName" id="editLastName">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Age</label>
                        <input type="number" class="form-control" name="age" id="editAge">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Email</label>
                        <input type="text" class="form-control" name="email" id="editEmail">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Password</label>
                        <input type="password" class="form-control" name="password">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Role</label>
                        <select multiple id="editRoles" class="form-select"></select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="updateUser()">Edit</button>
                </div>
        </div>
    </div>
</div>
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>


                <div class="modal-body">

                    <input type="hidden" name="id" id="deleteId">

                    <div class="mb-2">
                        <label>ID</label>
                        <input type="text" id="deleteIdView" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>First name</label>
                        <input type="text" id="deleteName" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>Last name</label>
                        <input type="text" id="deleteLastName" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>Age</label>
                        <input type="text" id="deleteAge" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>Email</label>
                        <input type="text" id="deleteEmail" class="form-control" disabled>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                    <button type="button" class="btn btn-danger" onclick="deleteUserFromModal()">Delete</button>
                </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
function loadRoles() {
    $.ajax({
        url: '/users/roles',
        method: 'GET',
        success: function (roles) {
            let select = $("#inputRole");
            let editSelect = $("#editRoles");

            select.empty();
            editSelect.empty();

            roles.forEach(r => {
                select.append(`<option value="${r.id}">${r.name}</option>`);
                editSelect.append(`<option value="${r.id}">${r.name}</option>`);
            });
        }
    });
}

function loadUsers() {
    $.ajax({
        url: '/users',
        method: 'GET',
        success: function (users) {
            let table = $("#usersTable");
            table.empty();

            users.forEach(u => {
                table.append(`
                <tr>
                    <td>${u.id}</td>
                    <td>${u.username}</td>
                    <td>${u.lastName}</td>
                    <td>${u.age}</td>
                    <td>${u.email}</td>
                    <td>${u.roles.map(r => r.name).join(' ')}</td>
                    <td><button class="btn btn-info" onclick="openEditModal(${u.id})">Edit</button></td>
                    <td><button class="btn btn-danger" onclick="openDeleteModal(${u.id})">Delete</button></td>
                </tr>
            `);
            });
        }
    });
}

$(document).ready(function () {
    loadUsers();
    loadRoles();
    $("#addUserForm")[0].reset();
});

$("#addUserForm").on("submit", function (e) {
    e.preventDefault();

    let user = {
        username: $("#inputFirstName").val(),
        lastName: $("#inputLastName").val(),
        age: $("#inputAge").val(),
        email: $("#inputEmail4").val(),
        password: $("#inputPass").val(),
        roles: getSelectedRoles("inputRole")
    };

    $.ajax({
        url: '/users',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(user),
        success: function () {
            loadUsers();
            $("#addUserForm")[0].reset();
        }
    });
});

function updateUser() {
    let user = {
        id: $("#editId").val(),
        username: $("#editName").val(),
        lastName: $("#editLastName").val(),
        age: $("#editAge").val(),
        email: $("#editEmail").val(),
        password: $("#editModal input[type='password']").val(),
        roles: getSelectedRoles("editRoles")
    };

    $.ajax({
        url: '/users',
        method: 'PUT',
        contentType: 'application/json',
        data: JSON.stringify(user),
        success: function () {
            loadUsers();
            $("#editModal").modal('hide');
        }
    });
}

function deleteUserFromModal() {
    let id = $("#deleteId").val();

    $.ajax({
        url: '/users/' + id,
        method: 'DELETE',
        success: function () {
            loadUsers();
            $("#deleteModal").modal('hide');
        }
    });
}

function openEditModal(id) {
    $.ajax({
        url: '/users/' + id,
        method: 'GET',
        success: function (u) {

            $("#editId").val(u.id);
            $("#editIdDisplay").val(u.id);
            $("#editName").val(u.username);
            $("#editLastName").val(u.lastName);
            $("#editAge").val(u.age);
            $("#editEmail").val(u.email);

            let rolesSelect = $("#editRoles");

            rolesSelect.find("option").each(function () {
                let option = $(this);
                let selected = u.roles.some(r => r.id == option.val());
                option.prop("selected", selected);
            });

            $("#editModal").modal('show');
        }
    });
}

function openDeleteModal(id) {
    $.ajax({
        url: '/users/' + id,
        method: 'GET',
        success: function (u) {

            $("#deleteId").val(u.id);
            $("#deleteIdView").val(u.id);
            $("#deleteName").val(u.username);
            $("#deleteLastName").val(u.lastName);
            $("#deleteAge").val(u.age);
            $("#deleteEmail").val(u.email);

            $("#deleteModal").modal('show');
        }
    });
}

function getSelectedRoles(selectId) {
    let roles = [];

    $("#" + selectId + " option:selected").each(function () {
        roles.push({ id: $(this).val() });
    });

    return roles;
}
</script>
</body>
</html>
