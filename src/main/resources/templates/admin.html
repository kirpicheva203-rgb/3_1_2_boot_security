<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
<h1>Admin Panel</h1>

<!-- Форма создания нового пользователя -->
<h2>Create New User</h2>
<form th:action="@{/admin/add}" th:object="${user}" method="post">

    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />

    Name: <input type="text" th:field="*{name}" />
    Last Name: <input type="text" th:field="*{lastName}" />
    Age: <input type="number" th:field="*{age}" />
    Username: <input type="text" th:field="*{username}" />
    Password: <input type="password" th:field="*{password}" />

    <select name="roleIds" multiple>
        <option th:each="role : ${allRoles}"
                th:value="${role.id}"
                th:text="${role.name}">
        </option>
    </select>

    <button type="submit">Create</button>
</form>

<!-- Таблица всех пользователей -->
<h2>All Users</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Roles</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.username}">admin</td>
        <td th:text="${user.name}">Admin</td>
        <td th:text="${user.lastName}">Adminov</td>
        <td th:text="${user.age}">30</td>
        <td>
                    <span th:each="role : ${user.roles}"
                          th:text="${role.name + ' '}">
                    </span>
        </td>
        <td>
            <form th:action="@{/admin/delete}" method="post">
                <input type="hidden" name="id" th:value="${user.id}">
                <button type="submit">Delete</button>
            </form>
            <form th:action="@{/admin/edit}" method="get">
                <input type="hidden" name="id" th:value="${user.id}">
                <button type="submit">Edit</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/logout}">Logout</a>
</body>
</html>
