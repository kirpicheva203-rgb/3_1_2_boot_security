<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="bg-dark text-white d-flex justify-content-between align-items-center px-3 py-2">
    <div>
        <strong th:text="${#authentication.principal.email}"></strong>
        with roles:
        <span th:each="role : ${#authentication.principal.authorities}"
              th:text="${#strings.replace(role.authority, 'ROLE_', '') + ' '}">
        </span>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">
            Logout
        </button>
    </form>
</div>
<div class="container-fluid">
    <div class="row">
        <!-- Создаём вертикальное меню -->
        <div class="col-2 bg-white min-vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item bg-primary text-white d-flex">
                    <a class="btn" href="/admin">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/user">User</a>
                </li>
            </ul>
        </div>
        <!-- Создаём основную оюласть -->
        <div class="col-10 p-4 mb-0">
            <h2>Admin panel</h2>
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#users">
                        Users table
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#newUser">
                        New User
                    </button>
                </li>
            </ul>
            <div class="tab-content mt-3">

                <!-- Форма добавления нового пользователя -->
                <div class="bg-white border tab-pane fade" id="newUser">
                    <form th:action="@{/admin/add}" th:object="${user}" method="post">
                        <div class="bg-light text-black-50">
                            <h5 class="mb-0 border p-3 bg-light text-dark">Add new user</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputFirstName">First Name</label>
                                </h6>
                                <input type="text" class="form-control" id="inputFirstName" th:field="*{name}"
                                       placeholder="First Name" required>
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputLastName">Last Name</label>
                                </h6>
                                <input type="text" class="form-control" id="inputLastName" th:field="*{lastName}"
                                       placeholder="Last Name" required>
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputAge">Age</label>
                                </h6>
                                <input type="number" class="form-control" th:field="*{age}" id="inputAge"
                                       placeholder="Age" required>
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputEmail4">Email</label>
                                </h6>
                                <input type="text" class="form-control" id="inputEmail4" th:field="*{email}"
                                       placeholder="Email" required>
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputPass">Password</label>
                                </h6>
                                <input type="password" class="form-control" id="inputPass" th:field="*{password}"
                                       placeholder="Password" required>
                            </div>
                            <div class="mb-2 mt-2 col-5 mx-auto form-group">
                                <h6 class="font-weight-bold text-center text-dark">
                                    <label for="inputRole">Role</label></h6>
                                <select multiple class="form-select" name="roleIds" id="inputRole" size="2">
                                    <option th:each="role : ${allRoles}"
                                            th:value="${role.id}"
                                            th:text="${role.name}">
                                    </option>
                                </select>
                            </div>
                            <div class="mb-2 mt-2 text-center">
                                <button type="submit" class="btn btn-success col-2">Add new user</button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>

            <!-- Таблица пользователей -->
            <div class="bg-white border tab-pane fade show active" id="users">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">All users</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-striped mb-0">
                            <thead class="table-white">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}"></td>
                                <td th:text="${u.name}"></td>
                                <td th:text="${u.lastName}"></td>
                                <td th:text="${u.age}"></td>
                                <td th:text="${u.email}"></td>
                                <td>
                        <span th:each="role : ${u.roles}"
                              th:text="${#strings.replace(role.name, 'ROLE_', '') + ' '}">
                        </span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-info"
                                            data-bs-toggle="modal"
                                            data-bs-target="#editModal"
                                            th:attr="data-id=${u.id},
                     data-name=${u.name},
                     data-lastname=${u.lastName},
                     data-age=${u.age},
                     data-email=${u.email}">
                                        Edit
                                    </button>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-danger"
                                            data-bs-toggle="modal"
                                            data-bs-target="#deleteModal"
                                            th:attr="data-id=${u.id},
                     data-name=${u.name},
                     data-lastname=${u.lastName},
                     data-age=${u.age},
                     data-email=${u.email}">
                                        Delete
                                    </button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form th:action="@{/admin/update}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input type="hidden" name="id" id="editId">

                    <div class="mb-3 text-center">
                        <label>ID</label>
                        <input type="text" class="form-control" id="editIdDisplay" disabled>
                    </div>

                    <div class="mb-3 text-center">
                        <label>First name</label>
                        <input type="text" class="form-control" name="username" id="editName">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Last name</label>
                        <input type="text" class="form-control" name="lastName" id="editLastName">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Age</label>
                        <input type="number" class="form-control" name="age" id="editAge">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Email</label>
                        <input type="text" class="form-control" name="email" id="editEmail">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Password</label>
                        <input type="password" class="form-control" name="password">
                    </div>

                    <div class="mb-3 text-center">
                        <label>Role</label>
                        <select multiple class="form-select" name="roleIds">
                            <option th:each="role : ${allRoles}"
                                    th:value="${role.id}"
                                    th:text="${role.name}">
                            </option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Edit</button>
                </div>

            </form>

        </div>
    </div>
</div>
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <form th:action="@{/admin/delete}" method="post">

                <div class="modal-body">

                    <input type="hidden" name="id" id="deleteId">

                    <div class="mb-2">
                        <label>ID</label>
                        <input type="text" id="deleteIdView" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>First name</label>
                        <input type="text" id="deleteName" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>Last name</label>
                        <input type="text" id="deleteLastName" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>Age</label>
                        <input type="text" id="deleteAge" class="form-control" disabled>
                    </div>

                    <div class="mb-2">
                        <label>Email</label>
                        <input type="text" id="deleteEmail" class="form-control" disabled>
                    </div>

                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                    <button type="submit" class="btn btn-danger">
                        Delete
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
<script>
    const editModal = document.getElementById('editModal');
    editModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        document.getElementById('editId').value = button.getAttribute('data-id');
        document.getElementById('editIdDisplay').value = button.getAttribute('data-id');
        document.getElementById('editName').value = button.getAttribute('data-name');
        document.getElementById('editLastName').value = button.getAttribute('data-lastname');
        document.getElementById('editAge').value = button.getAttribute('data-age');
        document.getElementById('editEmail').value = button.getAttribute('data-email');
    });

    const deleteModal = document.getElementById('deleteModal');

    deleteModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;

        document.getElementById('deleteId').value = button.getAttribute('data-id');
        document.getElementById('deleteIdView').value = button.getAttribute('data-id');
        document.getElementById('deleteName').value = button.getAttribute('data-name');
        document.getElementById('deleteLastName').value = button.getAttribute('data-lastname');
        document.getElementById('deleteAge').value = button.getAttribute('data-age');
        document.getElementById('deleteEmail').value = button.getAttribute('data-email');
    });
</script>
</body>
</html>
