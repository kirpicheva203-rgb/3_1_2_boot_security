<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="bg-dark text-white d-flex justify-content-between align-items-center px-3 py-2">
    <div>
        <strong th:text="${#authentication.principal.email}"></strong>
        with roles:
        <span th:each="role : ${#authentication.principal.authorities}"
              th:text="${#strings.replace(role.authority, 'ROLE_', '') + ' '}">
        </span>
    </div>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">
            Logout
        </button>
    </form>
</div>

<div class="container-fluid">
    <div class="row">

        <!-- sidebar -->
        <div class="col-2 bg-white min-vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item bg-primary text-white d-flex">
                    <a class="btn" href="/user">User</a>
                </li>
            </ul>
        </div>

        <!-- content -->
        <div class="col-10 p-4">
            <h2>User information-page</h2>

            <div class="card">
                <div class="card-header">
                    About user
                </div>

                <div class="card-body">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <td th:text="${user.name}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                 <span th:each="role : ${#authentication.principal.authorities}"
                                       th:text="${#strings.replace(role.authority, 'ROLE_', '') + ' '}">
                                 </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
